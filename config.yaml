# Yahoo Finance ticker symbols
default_watchlist:
  - symbol: "GC=F"
    name: "GOLD"
  - symbol: "SI=F"
    name: "SILVER"
  - symbol: "PL=F"
    name: "PLATINUM"
  - symbol: "PA=F"
    name: "PALLADIUM"

screener_symbols:
  - "AAPL"
  - "MSFT"
  - "GOOGL"
  - "AMZN"
  - "NVDA"
  - "TSLA"
  - "META"
  - "NFLX"
  - "AMD"
  - "INTC"
  - "JPM"
  - "GS"
  - "BA"
  - "DIS"
  - "NKE"
  - "KO"
  - "PFE"
  - "XOM"
  - "CVX"
  - "WMT"

alerts:
  rsi_extreme:
    enabled: true
    overbought: 80       # było 70 — teraz tylko naprawdę wykupione
    oversold: 20         # było 30 — teraz tylko naprawdę wyprzedane
    timeframes: ["1d"]   # tylko dzienny, bez 4h szumu
    cooldown_hours: 12
  ma_cross:
    enabled: true
    fast: 50
    slow: 200            # było 20/50 — teraz golden/death cross 50/200 (poważniejszy sygnał)
    timeframes: ["1d"]
    cooldown_hours: 24
  macd_cross:
    enabled: false       # wyłączone — za dużo fałszywych sygnałów
    timeframes: ["1d"]
    cooldown_hours: 12
  bb_breakout:
    enabled: false       # wyłączone — za częste na metalach
    timeframes: ["4h"]
    cooldown_hours: 12
  portfolio_change:
    enabled: true
    threshold_pct: 5.0   # było 3% — teraz tylko poważne ruchy
    cooldown_hours: 12

schedule:
  poll_interval_minutes: 2
  market_hours_start: 8   # CET
  market_hours_end: 22    # CET
  briefing_time: "07:30"
  screener_time: "07:00"
